name: Build ForgeTrack APK/AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'

jobs:
  build:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-bin.zip
          unzip -q gradle-${{ env.GRADLE_VERSION }}-bin.zip
          echo "GRADLE_HOME=$PWD/gradle-${{ env.GRADLE_VERSION }}" >> $GITHUB_ENV
          echo "$PWD/gradle-${{ env.GRADLE_VERSION }}/bin" >> $GITHUB_PATH
          gradle --version

      - name: Generate Release Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias forgetrack \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass forgetrack123 \
            -keypass forgetrack123 \
            -dname "CN=ForgeTrack, OU=Dev, O=ForgeTrack, L=Unknown, ST=Unknown, C=US"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: Build Release APK (Signed)
        run: gradle assembleRelease --no-daemon --stacktrace 2>&1

      - name: Build Release AAB (Signed)
        run: gradle bundleRelease --no-daemon --stacktrace 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ForgeTrack-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ForgeTrack-Release-APK
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ForgeTrack-Release-AAB
          path: app/build/outputs/bundle/release/*.aab

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "ForgeTrack v1.0.${{ github.run_number }}"
          body: |
            ## ForgeTrack - Professional Field Service & Job Tracker
            Built with Kotlin + Jetpack Compose + Material 3
            - **Build**: #${{ github.run_number }}
            - **Commit**: `${{ github.sha }}`
            - **Features**: Dashboard, Job Management, Client Management, Analytics, In-App Auto-Update, PDF Reports, GPS Check-in, Voice Notes, Photo Docs
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release APK | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release AAB | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts**: Actions > This Run > Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **Release**: Go to Releases tab for direct APK download" >> $GITHUB_STEP_SUMMARY
