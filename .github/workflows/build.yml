name: Build ForgeTrack APK/AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*', '**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Generate Release Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias forgetrack \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass forgetrack123 \
            -keypass forgetrack123 \
            -dname "CN=ForgeTrack, OU=Dev, O=ForgeTrack, L=Unknown, ST=Unknown, C=US"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Build Release APK (Signed)
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1

      - name: Build Release AAB (Signed)
        run: ./gradlew bundleRelease --no-daemon --stacktrace 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ForgeTrack-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ForgeTrack-Release-APK
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ForgeTrack-Release-AAB
          path: app/build/outputs/bundle/release/*.aab

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "ForgeTrack v1.0.${{ github.run_number }}"
          body: |
            ## ForgeTrack - Professional Field Service & Job Tracker
            Pure Native Android (Kotlin + Jetpack Compose + Material 3)
            - **Build**: #${{ github.run_number }}
            - **Commit**: `${{ github.sha }}`
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release APK | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release AAB | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Downloads in Actions > This Run > Artifacts" >> $GITHUB_STEP_SUMMARY
